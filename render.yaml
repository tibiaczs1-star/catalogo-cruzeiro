services:
  - type: web
    name: catalogo-cruzeiro-web
    runtime: node
    rootDir: .
    plan: starter
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Rio_Branco
      - key: SITE_URL
        value: https://catalogo-cruzeiro-web.onrender.com
      - key: ADMIN_TOKEN
        sync: false
      - key: SUPER_ADMIN_USER
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: POLL_ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_AUTH_CLIENT_ID
        sync: false
      - key: SITE_AUTH_SESSION_SECRET
        sync: false
      - key: NINJAS_PIX_KEY
        sync: false
      - key: NINJAS_PIX_RECEIVER_NAME
        sync: false
      - key: NINJAS_MERCHANT_NAME
        sync: false
      - key: NINJAS_MERCHANT_CITY
        sync: false
