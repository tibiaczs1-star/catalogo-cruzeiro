<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentes Reais em Operação • Catálogo Cruzeiro do Sul</title>
    <link rel="stylesheet" href="real-agents.css?v=20260421a" />
  </head>
  <body class="real-agents-page">
    <header class="agents-topbar">
      <a href="index.html">Home</a>
      <a href="escritorio.html">Escritório</a>
      <a href="escritorio-arte.html">Arte</a>
      <a href="escritorio-ninjas.html">Ninjas</a>
    </header>

    <main class="agents-shell">
      <section class="agents-hero" aria-labelledby="agentsTitle">
        <div>
          <p class="agents-kicker">Operação viva</p>
          <h1 id="agentsTitle">Agentes reais do jornal</h1>
          <p>
            Cadastro, capacidades, monitoramento e fila de trabalho dos agentes que acompanham as notícias,
            revisões e oportunidades do portal.
          </p>
        </div>
        <form class="agents-runner" id="agentsRunner">
          <label>
            Senha Full Admin
            <input name="password" type="password" autocomplete="current-password" placeholder="••••••••" />
          </label>
          <button type="submit">Rodar agora</button>
          <span id="agentsStatus" role="status">Abrindo operação...</span>
        </form>
      </section>

      <section class="agents-stats" id="agentsStats" aria-label="Resumo dos agentes"></section>

      <section class="agents-layout">
        <aside class="agents-sidebar">
          <div class="agents-panel">
            <h2>Escritórios</h2>
            <div id="officeList" class="agents-office-list"></div>
          </div>
          <div class="agents-panel">
            <h2>Funções</h2>
            <div id="roleList" class="agents-role-list"></div>
          </div>
        </aside>

        <section class="agents-main-panel" aria-labelledby="queueTitle">
          <div class="agents-toolbar">
            <div>
              <h2 id="queueTitle">Fila operacional</h2>
              <p id="runMeta">Última rodada ainda não carregada.</p>
            </div>
            <input id="agentSearch" type="search" placeholder="Buscar agente, escritório, função ou tarefa" />
          </div>
          <div id="queueList" class="agents-queue"></div>
        </section>
      </section>
    </main>

    <script defer src="real-agents.js?v=20260421a"></script>
  </body>
</html>
