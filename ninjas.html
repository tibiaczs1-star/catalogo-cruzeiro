<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <title>Serviço indisponível | Catálogo Cruzeiro do Sul</title>
    <style>
      :root {
        color-scheme: dark;
        background: #041220;
        color: #f8fafc;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 34rem),
          #041220;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 12px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 8vw, 3.2rem);
        line-height: 1;
      }

      p {
        margin: 0 0 20px;
        color: #cbd5e1;
        font-size: 1rem;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 0 18px;
        border-radius: 8px;
        background: #fbbf24;
        color: #111827;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Serviço indisponível</h1>
      <p>Esta área foi retirada do portal enquanto não houver operação confirmada para o público.</p>
      <a href="./index.html?skipIntro=1">Voltar para a home</a>
    </main>
  </body>
</html>
