<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">Story do Catalogo Cruzeiro do Sul</title>
  <desc id="desc">Arte vertical 9:16 para stories e reels do Catalogo Cruzeiro do Sul.</desc>
  <defs>
    <linearGradient id="storyBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061325"/>
      <stop offset="0.45" stop-color="#124a73"/>
      <stop offset="0.72" stop-color="#d9853e"/>
      <stop offset="1" stop-color="#f4d78a"/>
    </linearGradient>
    <style>
      .kicker { font: 800 31px/1 Arial, Helvetica, sans-serif; letter-spacing: 5px; text-transform: uppercase; }
      .brand { font: 900 92px/0.94 Arial, Helvetica, sans-serif; letter-spacing: -1px; }
      .headline { font: 900 118px/0.88 Arial, Helvetica, sans-serif; letter-spacing: -2px; }
      .body { font: 650 39px/1.25 Arial, Helvetica, sans-serif; }
      .cta { font: 900 35px/1 Arial, Helvetica, sans-serif; letter-spacing: 2px; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1080" height="1920" fill="url(#storyBg)"/>
  <g opacity="0.18">
    <path d="M-60 306 C118 210 290 375 460 285 S780 112 1138 222" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M-80 1405 C175 1268 348 1450 566 1328 S828 1160 1140 1208" fill="none" stroke="#fff3c6" stroke-width="2"/>
  </g>
  <g opacity="0.98">
    <circle cx="760" cy="176" r="10" fill="#fff5c5"/>
    <circle cx="813" cy="252" r="6" fill="#fff5c5"/>
    <circle cx="712" cy="266" r="5" fill="#fff5c5"/>
    <circle cx="758" cy="329" r="8" fill="#fff5c5"/>
    <circle cx="880" cy="326" r="5" fill="#fff5c5"/>
  </g>
  <text x="74" y="130" fill="#ffffff" class="kicker">Cruzeiro do Sul • Vale do Juruá</text>
  <text x="74" y="268" fill="#ffffff" class="brand">Catálogo</text>
  <text x="74" y="354" fill="#ffffff" class="brand">Cruzeiro</text>
  <text x="74" y="440" fill="#ffffff" class="brand">do Sul</text>
  <text x="74" y="670" fill="#ffffff" class="headline">Tá</text>
  <text x="74" y="782" fill="#ffffff" class="headline">chegando</text>
  <text x="74" y="894" fill="#ffffff" class="headline">o novo</text>
  <text x="80" y="1010" fill="#eaf8ff" class="body">Pra informar melhor.</text>
  <text x="80" y="1062" fill="#eaf8ff" class="body">Pra entreter com leveza.</text>
  <text x="80" y="1114" fill="#eaf8ff" class="body">Pra mostrar todos os caminhos.</text>
  <text x="80" y="1166" fill="#eaf8ff" class="body">24 horas por dia.</text>
  <g transform="translate(80 1262)">
    <rect width="398" height="74" rx="37" fill="#ffcf63"/>
    <text x="34" y="49" fill="#09223a" class="cta">sem poluição</text>
    <rect x="0" y="94" width="398" height="74" rx="37" fill="#ffffff" opacity="0.92"/>
    <text x="34" y="143" fill="#09223a" class="cta">sem ideologia</text>
  </g>
  <path d="M0 1590 C200 1490 356 1645 542 1538 C724 1434 848 1462 1080 1334 L1080 1920 L0 1920 Z" fill="#082941" opacity="0.82"/>
  <path d="M80 1706 C265 1598 395 1718 560 1628 C734 1534 838 1510 1010 1438" fill="none" stroke="#f7feff" stroke-width="11" stroke-linecap="round" opacity="0.84"/>
  <text x="80" y="1834" fill="#ffffff" class="body">@catalogocruzeirodosul</text>
</svg>
