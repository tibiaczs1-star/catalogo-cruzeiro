<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Material premium real do Catalogo Cruzeiro do Sul</title>
  <desc id="desc">Post vertical de divulgacao usando foto real de Cruzeiro do Sul, Acre, com Catedral Nossa Senhora da Gloria.</desc>
  <defs>
    <linearGradient id="darkWash" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06111f" stop-opacity="0.95"/>
      <stop offset="0.48" stop-color="#10233C" stop-opacity="0.74"/>
      <stop offset="1" stop-color="#10233C" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" x2="1">
      <stop offset="0" stop-color="#E0B45D"/>
      <stop offset="1" stop-color="#CD6F41"/>
    </linearGradient>
    <style>
      .kicker { font: 800 25px/1.1 Arial, Helvetica, sans-serif; letter-spacing: 5px; text-transform: uppercase; }
      .headline { font: 900 96px/0.88 Arial, Helvetica, sans-serif; letter-spacing: -2px; }
      .body { font: 650 35px/1.24 Arial, Helvetica, sans-serif; }
      .seal { font: 850 27px/1.1 Arial, Helvetica, sans-serif; letter-spacing: 1px; text-transform: uppercase; }
      .brand { font: 900 50px/0.98 Arial, Helvetica, sans-serif; letter-spacing: 6px; text-transform: uppercase; }
      .caption { font: 700 22px/1.25 Arial, Helvetica, sans-serif; letter-spacing: 2px; text-transform: uppercase; }
    </style>
  </defs>
  <rect width="1080" height="1350" fill="#10233C"/>
  <image href="../../home-cache/buzz-cruzeiro-04.jpg" x="-250" y="0" width="1580" height="1350" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1080" height="1350" fill="url(#darkWash)"/>
  <rect x="0" y="0" width="1080" height="1350" fill="#06111f" opacity="0.18"/>

  <g opacity="0.9">
    <path d="M88 780 C210 706 342 782 482 712 C628 639 772 642 982 526" fill="none" stroke="#E0B45D" stroke-width="4" stroke-linecap="round" opacity="0.76"/>
    <path d="M96 856 C270 758 410 874 586 780 C764 684 850 704 1012 620" fill="none" stroke="#4A90E2" stroke-width="2.5" stroke-linecap="round" opacity="0.62"/>
    <circle cx="88" cy="780" r="7" fill="#F4ECDF"/>
    <circle cx="482" cy="712" r="7" fill="#F4ECDF"/>
    <circle cx="982" cy="526" r="7" fill="#F4ECDF"/>
  </g>

  <g transform="translate(78 86)">
    <rect x="-16" y="-18" width="390" height="78" rx="39" fill="#10233C" opacity="0.72"/>
    <image href="../../logo-czs.svg" x="0" y="-4" width="58" height="58"/>
    <text x="78" y="25" fill="#F4ECDF" class="kicker">Cruzeiro do Sul • Acre</text>
  </g>

  <text x="78" y="220" fill="#F4ECDF" class="headline">Tá</text>
  <text x="78" y="306" fill="#F4ECDF" class="headline">chegando</text>
  <text x="78" y="392" fill="#E0B45D" class="headline">o novo.</text>
  <rect x="78" y="432" width="190" height="8" fill="url(#goldLine)"/>
  <text x="78" y="510" fill="#FFFFFF" class="body">Informação, entretenimento</text>
  <text x="78" y="554" fill="#FFFFFF" class="body">e caminhos de Cruzeiro do Sul,</text>
  <text x="78" y="598" fill="#E0B45D" class="body">24 horas por dia.</text>

  <g transform="translate(78 980)">
    <rect width="924" height="198" rx="34" fill="#06111f" opacity="0.8"/>
    <rect x="1" y="1" width="922" height="196" rx="33" fill="none" stroke="#E0B45D" stroke-width="2"/>
    <image href="../../favicon.svg" x="36" y="38" width="118" height="118"/>
    <text x="184" y="68" fill="#E0B45D" class="caption">Catálogo</text>
    <text x="184" y="124" fill="#F4ECDF" class="brand">Cruzeiro do Sul</text>
    <text x="184" y="160" fill="#D7E3F3" class="caption">O portal da nossa cidade</text>
  </g>

  <g transform="translate(78 1210)">
    <rect width="738" height="70" rx="35" fill="#F4ECDF" opacity="0.96"/>
    <text x="34" y="45" fill="#10233C" class="seal">Sem poluição. Sem ideologia. Só caminhos.</text>
  </g>
  <text x="78" y="1310" fill="#F4ECDF" opacity="0.78" class="caption">Foto real: Cruzeiro do Sul, AC • Catedral Nossa Senhora da Glória</text>
</svg>
