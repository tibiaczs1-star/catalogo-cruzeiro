<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">Poster social do Catalogo Cruzeiro do Sul</title>
  <desc id="desc">Arte vertical para redes sociais anunciando a nova fase do Catalogo Cruzeiro do Sul.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071629"/>
      <stop offset="0.48" stop-color="#123c62"/>
      <stop offset="1" stop-color="#f1b24a"/>
    </linearGradient>
    <linearGradient id="river" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#35c2d7"/>
      <stop offset="0.55" stop-color="#156e96"/>
      <stop offset="1" stop-color="#082941"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .small { font: 700 30px/1.2 Arial, Helvetica, sans-serif; letter-spacing: 5px; text-transform: uppercase; }
      .brand { font: 900 98px/0.92 Arial, Helvetica, sans-serif; letter-spacing: -1px; }
      .headline { font: 900 82px/0.94 Arial, Helvetica, sans-serif; letter-spacing: -1px; }
      .body { font: 600 34px/1.25 Arial, Helvetica, sans-serif; }
      .pill { font: 800 28px/1 Arial, Helvetica, sans-serif; letter-spacing: 2px; text-transform: uppercase; }
      .footer { font: 700 27px/1.2 Arial, Helvetica, sans-serif; }
    </style>
  </defs>
  <rect width="1080" height="1350" fill="url(#sky)"/>
  <g opacity="0.28">
    <path d="M-30 220 C170 160 260 285 430 228 S740 80 1115 140" fill="none" stroke="#83dcff" stroke-width="2"/>
    <path d="M-40 312 C160 248 318 372 505 300 S800 180 1125 250" fill="none" stroke="#ffffff" stroke-width="1.4"/>
    <path d="M-35 1088 C230 956 432 1065 614 934 S872 770 1130 865" fill="none" stroke="#ffd88a" stroke-width="2"/>
  </g>
  <g filter="url(#softGlow)" opacity="0.96">
    <circle cx="786" cy="178" r="9" fill="#fff5c5"/>
    <circle cx="824" cy="234" r="6" fill="#fff5c5"/>
    <circle cx="748" cy="246" r="5" fill="#fff5c5"/>
    <circle cx="782" cy="292" r="7" fill="#fff5c5"/>
    <circle cx="872" cy="296" r="4.5" fill="#fff5c5"/>
  </g>
  <text x="80" y="95" fill="#f8fbff" class="small">Cruzeiro do Sul • Acre</text>
  <text x="80" y="197" fill="#ffffff" class="brand">Catálogo</text>
  <text x="80" y="287" fill="#ffffff" class="brand">Cruzeiro</text>
  <text x="80" y="377" fill="#ffffff" class="brand">do Sul</text>
  <g transform="translate(80 446)">
    <rect width="386" height="60" rx="30" fill="#ffcf63"/>
    <text x="32" y="40" fill="#09223a" class="pill">24 horas por dia</text>
  </g>
  <text x="80" y="610" fill="#ffffff" class="headline">Tá chegando</text>
  <text x="80" y="688" fill="#ffffff" class="headline">o novo.</text>
  <text x="80" y="768" fill="#e9f7ff" class="body">Pra libertar informação,</text>
  <text x="80" y="812" fill="#e9f7ff" class="body">entreter e mostrar todos</text>
  <text x="80" y="856" fill="#e9f7ff" class="body">os caminhos da cidade.</text>
  <g transform="translate(80 930)">
    <rect width="318" height="72" rx="18" fill="#ffffff" opacity="0.94"/>
    <text x="30" y="46" fill="#102b46" class="footer">Sem poluição</text>
    <rect x="336" width="296" height="72" rx="18" fill="#ffffff" opacity="0.9"/>
    <text x="366" y="46" fill="#102b46" class="footer">Sem ideologia</text>
    <rect x="650" width="234" height="72" rx="18" fill="#ffffff" opacity="0.86"/>
    <text x="680" y="46" fill="#102b46" class="footer">Só caminhos</text>
  </g>
  <path d="M0 1136 C196 1036 354 1193 524 1095 C696 994 786 1061 1080 948 L1080 1350 L0 1350 Z" fill="url(#river)" opacity="0.94"/>
  <path d="M86 1230 C250 1160 367 1260 520 1190 C674 1120 820 1110 1002 1038" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.82"/>
  <g transform="translate(82 1194)" fill="#ffffff">
    <circle cx="0" cy="0" r="8"/>
    <circle cx="188" cy="-49" r="8"/>
    <circle cx="374" cy="-12" r="8"/>
    <circle cx="554" cy="-76" r="8"/>
    <circle cx="742" cy="-116" r="8"/>
  </g>
  <text x="80" y="1282" fill="#ffffff" class="footer">@catalogocruzeirodosul</text>
  <text x="730" y="1282" fill="#ffffff" class="footer">Notícia • Serviço • Cultura</text>
</svg>
