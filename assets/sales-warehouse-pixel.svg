<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-labelledby="title desc" shape-rendering="crispEdges">
  <title id="title">Marketplace de usados em pixel art</title>
  <desc id="desc">Cena em pixel art com varios trabalhadores separando itens usados, empilhando produtos e levando caixas para uma esteira de marketplace local.</desc>
  <defs>
    <pattern id="rollers" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#3a4860"/>
      <rect x="3" width="2" height="10" fill="#71819d"/>
      <rect x="7" width="2" height="10" fill="#71819d"/>
    </pattern>
    <style>
      .worker,
      .crate-flow,
      .crate-stack-top,
      .scan-arm {
        transform-box: fill-box;
        transform-origin: center;
      }

      .worker {
        animation: workerBob 1.9s steps(2, end) infinite;
      }

      .worker-b {
        animation-delay: -0.5s;
      }

      .worker-c {
        animation-delay: -1s;
      }

      .worker-d {
        animation-delay: -1.3s;
      }

      .worker-e {
        animation-delay: -0.9s;
      }

      .worker-f {
        animation-delay: -1.7s;
      }

      .worker-g {
        animation-delay: -0.2s;
      }

      .carry-heavy {
        animation-duration: 2.3s;
      }

      .crate-flow {
        animation: crateMove 4.8s linear infinite;
      }

      .crate-flow.two {
        animation-delay: -2.2s;
      }

      .crate-stack-top {
        animation: stackLift 2.8s ease-in-out infinite;
      }

      .scan-arm {
        animation: scanSweep 1.8s ease-in-out infinite alternate;
      }

      @media (prefers-reduced-motion: reduce) {
        .worker,
        .crate-flow,
        .crate-stack-top,
        .scan-arm {
          animation: none !important;
        }
      }

      @keyframes workerBob {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-2px);
        }
      }

      @keyframes crateMove {
        0% {
          transform: translateX(-16px);
          opacity: 0;
        }

        8%,
        78% {
          opacity: 1;
        }

        100% {
          transform: translateX(72px);
          opacity: 0;
        }
      }

      @keyframes stackLift {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-3px);
        }
      }

      @keyframes scanSweep {
        from {
          transform: rotate(-4deg);
        }

        to {
          transform: rotate(4deg);
        }
      }
    </style>
  </defs>

