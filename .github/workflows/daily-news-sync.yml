name: Daily News & Business Sync

on:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run daily collector (once)
        run: node backend/workers/catalogo-autoupdate-worker.js --once

      - name: Run autonomous agents cycle
        run: npm run agents:cycle

      - name: Audit news image focus
        run: npm run audit:news-images -- --limit=80 --strict-new --notify-whatsapp=new
        env:
          WHATSAPP_ALERT_ENABLED: ${{ secrets.WHATSAPP_ALERT_ENABLED }}
          WHATSAPP_CLOUD_TOKEN: ${{ secrets.WHATSAPP_CLOUD_TOKEN }}
          WHATSAPP_CLOUD_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_CLOUD_PHONE_NUMBER_ID }}
          WHATSAPP_ALERT_TO: ${{ secrets.WHATSAPP_ALERT_TO }}

      - name: Commit and push updates
        run: |
          git config user.name "catalogo-bot"
          git config user.email "catalogo-bot@users.noreply.github.com"
          git add data/*.json backend/data/*.json news-data.js .codex-agents/registry.json .codex-agents/agents/*.md .codex-temp/real-agents/*.json .codex-temp/real-agents/*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
            exit 0
          fi
          git commit -m "chore: atualização diária de notícias e empreendimentos"
          git push
