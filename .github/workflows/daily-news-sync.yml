name: Daily News & Business Sync

on:
  schedule:
    # America/Rio_Branco (UTC-5): 07:15, 14:15 e 21:15.
    - cron: "15 12 * * *"
    - cron: "15 19 * * *"
    - cron: "15 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run business collector
        run: node backend/workers/catalogo-autoupdate-worker.js --once

      - name: Run full news search with agents
        run: npm run sync:online-local
        env:
          WHATSAPP_ALERT_ENABLED: ${{ secrets.WHATSAPP_ALERT_ENABLED }}
          WHATSAPP_CLOUD_TOKEN: ${{ secrets.WHATSAPP_CLOUD_TOKEN }}
          WHATSAPP_CLOUD_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_CLOUD_PHONE_NUMBER_ID }}
          WHATSAPP_ALERT_TO: ${{ secrets.WHATSAPP_ALERT_TO }}

      - name: Commit and push updates
        run: |
          git config user.name "catalogo-bot"
          git config user.email "catalogo-bot@users.noreply.github.com"
          git add data/*.json backend/data/*.json news-data.js assets/news-fallbacks/*.svg .codex-agents/registry.json .codex-agents/agents/*.md .codex-temp/real-agents/*.json .codex-temp/real-agents/*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
            exit 0
          fi
          git commit -m "chore: atualização diária de notícias e empreendimentos"
          git push
