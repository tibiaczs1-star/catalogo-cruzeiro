name: Daily News & Business Sync

on:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run daily collector (once)
        run: node backend/workers/catalogo-autoupdate-worker.js --once

      - name: Audit news image focus
        run: npm run audit:news-images -- --limit=80

      - name: Commit and push updates
        run: |
          git config user.name "catalogo-bot"
          git config user.email "catalogo-bot@users.noreply.github.com"
          git add data/*.json backend/data/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sem alterações para commit."
            exit 0
          fi
          git commit -m "chore: atualização diária de notícias e empreendimentos"
          git push
